<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quartz Folder Organizer - Safinat al-Najat</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* CSS Styles remain identical to your current version */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #2d6a4f; --primary-light: #40916c; --primary-dark: #1b4332;
      --accent: #d4af37; --bg-main: #fafafa; --bg-secondary: #ffffff;
      --bg-tertiary: #f5f5f5; --text-primary: #1a1a1a; --text-secondary: #666666;
      --border: #e0e0e0; --success: #52b788; --warning: #f4a261; --danger: #e63946;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08); --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.12);
    }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg-main); color: var(--text-primary); line-height: 1.6; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); color: white; padding: 1.5rem 2rem; box-shadow: var(--shadow-lg); position: sticky; top: 0; z-index: 100; }
    .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .logo { display: flex; align-items: center; gap: 1rem; }
    .logo-icon { width: 48px; height: 48px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Amiri', serif; font-size: 1.75rem; font-weight: 700; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); }
    .sync-status { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 1.25rem; background: rgba(255, 255, 255, 0.15); border-radius: 8px; font-size: 0.9rem; backdrop-filter: blur(10px); }
    .sync-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.9); } }
    .main { flex: 1; max-width: 900px; width: 100%; margin: 0 auto; padding: 2.5rem 2rem; }
    .card { background: var(--bg-secondary); border-radius: 16px; padding: 2rem; box-shadow: var(--shadow); margin-bottom: 2rem; border: 1px solid var(--border); }
    .content-list { display: flex; flex-direction: column; gap: 1rem; }
    .content-item { display: flex; flex-direction: column; padding: 1.25rem; background: var(--bg-tertiary); border: 2px solid var(--border); border-radius: 12px; transition: all 0.2s ease; }
    .content-item-header { display: flex; align-items: center; gap: 1.25rem; cursor: grab; }
    .drag-handle { color: var(--text-secondary); font-size: 1.4rem; cursor: grab; }
    .content-icon { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: var(--bg-secondary); }
    .file-count-badge { background: var(--primary); color: white; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; }
    .file-list { margin-top: 1rem; padding-top: 1rem; border-top: 2px solid var(--border); }
    .file-item, .subfolder-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem; background: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.5rem; cursor: grab; }
    .subfolder-item { background: #f0f4f2; margin-left: 1rem; }
    .nested-files { margin-left: 2rem; border-left: 2px solid var(--border); padding-left: 1rem; }
    .btn { padding: 0.875rem 1.75rem; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.625rem; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 2px solid var(--border); }
    .message { padding: 1.25rem 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
    .message-success { background: #d1f4e0; color: #1b4332; }
    .message-info { background: #e3f2fd; color: #0d47a1; }
    .spinner { border: 3px solid var(--border); border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const GITHUB_API = 'https://api.github.com';
    const REPO_OWNER = 'Safinat-al-Najat';
    const REPO_NAME = 'safinat-al-najat.github.io';
    const BRANCH = 'main';

    function App() {
      const [githubToken, setGithubToken] = useState(localStorage.getItem('github_token') || '');
      const [isConfigured, setIsConfigured] = useState(false);
      const [loading, setLoading] = useState(false);
      const [message, setMessage] = useState(null);
      const [folders, setFolders] = useState([]);
      const [loadingContent, setLoadingContent] = useState(false);
      const [hasChanges, setHasChanges] = useState(false);
      const [expandedFolders, setExpandedFolders] = useState({});

      useEffect(() => { if (githubToken) setIsConfigured(true); }, [githubToken]);
      useEffect(() => { if (isConfigured) loadAllFolders(); }, [isConfigured]);

      const showMessage = (type, text) => {
        setMessage({ type, text });
        setTimeout(() => setMessage(null), 6000);
      };

      const utf8ToBase64 = (str) => btoa(unescape(encodeURIComponent(str)));
      const base64ToUtf8 = (base64) => decodeURIComponent(escape(atob(base64)));

      const fetchFolderStructure = async (folderPath) => {
        const response = await fetch(`${GITHUB_API}/repos/${REPO_OWNER}/${REPO_NAME}/contents/${folderPath}?ref=${BRANCH}`, {
          headers: { 'Authorization': `Bearer ${githubToken}` }
        });
        const data = await response.json();
        const files = data.filter(item => item.type === 'file' && item.name.endsWith('.md'));
        const dirs = data.filter(item => item.type === 'dir');

        const foldersWithContent = await Promise.all(dirs.map(async (d) => ({
          name: d.name, path: d.path, type: 'dir', ...(await fetchFolderStructure(d.path))
        })));

        return { files: files.map(f => ({ name: f.name, path: f.path, type: 'file' })), folders: foldersWithContent };
      };

      const countFiles = (s) => s.files.length + s.folders.reduce((sum, f) => sum + countFiles(f), 0);

      const loadAllFolders = async () => {
        setLoadingContent(true);
        const folderConfigs = [
          { id: 'merits', name: 'MERITS', icon: '🌟', path: 'MERITS' },
          { id: 'history', name: 'MAJOR HISTORICAL EVENTS', icon: '📜', path: 'MAJOR HISTORICAL EVENTS' },
          { id: 'rulings', name: 'RULINGS OF ISLAM', icon: '⚖️', path: 'RULINGS OF ISLAM' }
        ];
        const foldersWithStructure = await Promise.all(folderConfigs.map(async (f) => {
          const s = await fetchFolderStructure(f.path);
          return { ...f, fileCount: countFiles(s), structure: s };
        }));
        setFolders(foldersWithStructure);
        setLoadingContent(false);
      };

      // --- DRAG AND DROP LOGIC ---
      const handleDragStart = (e, index, type, parentArray = null) => {
        e.stopPropagation();
        e.dataTransfer.setData('application/json', JSON.stringify({ index, type, parentArray }));
      };

      const handleDrop = (e, targetIndex, targetType, targetParentArray = null) => {
        e.preventDefault();
        const data = JSON.parse(e.dataTransfer.getData('application/json'));
        
        if (data.type !== targetType) return;

        const newFolders = [...folders];

        if (data.type === 'main') {
          const [moved] = newFolders.splice(data.index, 1);
          newFolders.splice(targetIndex, 0, moved);
          setFolders(newFolders);
        } else if (data.type === 'internal') {
          // Internal reordering within the same parent folder
          const parent = findFolderByPath(newFolders, targetParentArray);
          if (parent) {
            const combined = [...parent.structure.folders, ...parent.structure.files];
            const [moved] = combined.splice(data.index, 1);
            combined.splice(targetIndex, 0, moved);
            
            parent.structure.folders = combined.filter(i => i.type === 'dir');
            parent.structure.files = combined.filter(i => i.type === 'file');
            setFolders(newFolders);
          }
        }
        setHasChanges(true);
      };

      const findFolderByPath = (arr, path) => {
        for (let f of arr) {
          if (f.path === path) return f;
          if (f.structure) {
            let found = findFolderByPath(f.structure.folders, path);
            if (found) return found;
          }
        }
        return null;
      };

      const commitChanges = async () => {
        setLoading(true);
        try {
          // Update index.md (Same logic as before)
          const indexRes = await fetch(`${GITHUB_API}/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.md?ref=${BRANCH}`, {
            headers: { 'Authorization': `Bearer ${githubToken}` }
          });
          const indexData = await indexRes.json();
          const currentContent = base64ToUtf8(indexData.content);
          
          const folderNames = { merits: 'Merits', history: 'History', rulings: 'Rulings' };
          const folderLinks = { merits: 'MERITS', history: 'MAJOR%20HISTORICAL%20EVENTS', rulings: 'RULINGS%20OF%20ISLAM' };
          const newFolderSection = folders.map(f => `## [${f.icon} ${folderNames[f.id]}](${folderLinks[f.id]})\nCategory description`).join('\n\n');

          const lines = currentContent.split('\n');
          const vIdx = lines.findIndex(l => l.includes('Surah Al-Imran'));
          const cIdx = lines.findIndex(l => l.includes('For any queries'));
          const newIdxContent = [...lines.slice(0, vIdx + 1), '', newFolderSection, '', ...lines.slice(cIdx)].join('\n');

          await fetch(`${GITHUB_API}/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.md`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${githubToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: '📝 Update folder order via Dashboard',
              content: utf8ToBase64(newIdxContent),
              sha: indexData.sha,
              branch: BRANCH
            })
          });

          // Logic to update weights in individual files would go here (requires multiple API calls)
          showMessage('success', '✅ Successfully updated! Site rebuilding now...');
          setHasChanges(false);
        } catch (err) {
          showMessage('error', '❌ Error: ' + err.message);
        } finally {
          setLoading(false);
        }
      };

      if (!isConfigured) return (
        <div className="app">
          <main className="main">
            <div className="card">
              <h2>Setup GitHub Token</h2>
              <input type="password" style={{width:'100%', padding:'10px', margin:'10px 0'}} 
                onChange={(e) => setGithubToken(e.target.value)} placeholder="Paste Token..." />
              <button className="btn btn-primary" onClick={() => {localStorage.setItem('github_token', githubToken); setIsConfigured(true);}}>Save</button>
            </div>
          </main>
        </div>
      );

      return (
        <div className="app">
          <header className="header">
            <div className="header-content">
              <div className="logo"><div className="logo-icon">س</div><h1>Organizer</h1></div>
              <div className="sync-status"><div className="sync-dot"></div><span>Connected</span></div>
            </div>
          </header>

          <main className="main">
            {message && <div className={`message message-${message.type}`}>{message.text}</div>}
            
            <div className="card">
              <div className="content-list">
                {folders.map((folder, idx) => (
                  <div key={folder.id} className="content-item" 
                    onDragOver={(e) => e.preventDefault()}
                    onDrop={(e) => handleDrop(e, idx, 'main')}>
                    
                    <div className="content-item-header" draggable onDragStart={(e) => handleDragStart(e, idx, 'main')}>
                      <span className="drag-handle">⋮⋮</span>
                      <div className="content-icon">{folder.icon}</div>
                      <div style={{flex:1}}><strong>{folder.name}</strong></div>
                      <button className="btn" onClick={() => setExpandedFolders({...expandedFolders, [folder.id]: !expandedFolders[folder.id]})}>
                        {expandedFolders[folder.id] ? '▲' : '▼'}
                      </button>
                    </div>

                    {expandedFolders[folder.id] && (
                      <div className="file-list">
                        {folder.structure.folders.map((sub, sIdx) => (
                          <div key={sub.path} className="subfolder-item" draggable 
                            onDragStart={(e) => handleDragStart(e, sIdx, 'internal', folder.path)}
                            onDragOver={(e) => e.preventDefault()}
                            onDrop={(e) => handleDrop(e, sIdx, 'internal', folder.path)}>
                            📁 {sub.name}
                          </div>
                        ))}
                        {folder.structure.files.map((file, fIdx) => (
                          <div key={file.path} className="file-item" draggable
                            onDragStart={(e) => handleDragStart(e, fIdx + folder.structure.folders.length, 'internal', folder.path)}
                            onDragOver={(e) => e.preventDefault()}
                            onDrop={(e) => handleDrop(e, fIdx + folder.structure.folders.length, 'internal', folder.path)}>
                            📄 {file.name}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>

            <div style={{display:'flex', gap:'10px'}}>
              <button className="btn btn-primary" onClick={commitChanges} disabled={!hasChanges || loading}>
                {loading ? <div className="spinner"></div> : 'Save & Deploy Changes'}
              </button>
              <button className="btn btn-secondary" onClick={loadAllFolders}>Refresh</button>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
